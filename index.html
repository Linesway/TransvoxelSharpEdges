<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cube — PlayCanvas</title>
  <style>
    * { margin: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: #0c0c10;
      color: #e0e0e0;
      font-family: system-ui, sans-serif;
    }
    #canvas-container {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
    }
    #application {
      width: 100%;
      height: 100%;
      display: block;
    }
    .hint {
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.75rem;
      opacity: 0.7;
      pointer-events: none;
    }
  </style>
  <script type="importmap">
  {
    "imports": {
      "playcanvas": "https://cdn.jsdelivr.net/npm/playcanvas/build/playcanvas/src/index.js"
    }
  }
  </script>
</head>
<body>
  <div id="canvas-container">
    <canvas id="application"></canvas>
  </div>
  <p class="hint">Look: drag mouse · Move: W/S forward/back · A/D strafe · Q/E up/down</p>
  <script type="module" src="./src/main.js"></script>
  <script>
    window.addEventListener('error', function(e) {
      console.error('Page error:', e.message, e.filename, e.lineno, e.colno, e.error);
    });
    window.addEventListener('unhandledrejection', function(e) {
      console.error('Unhandled promise rejection:', e.reason);
    });
  </script>
</body>
</html>
